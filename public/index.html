<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AisleClear - Find allergen-free food</title>
  <meta name="description" content="Search packaged foods by allergen restrictions. Real ingredient data, no guessing." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f5;
      --surface: #ffffff;
      --border: #e4e4e0;
      --border-strong: #c8c8c4;
      --text-primary: #1a1a18;
      --text-secondary: #6b6b66;
      --text-muted: #9b9b96;
      --green-bg: #eaf3de;
      --green-text: #3b6d11;
      --green-border: #c0dd97;
      --yellow-bg: #faeeda;
      --yellow-text: #854f0b;
      --yellow-border: #fac775;
      --red-bg: #fcebeb;
      --red-text: #a32d2d;
      --red-border: #f7c1c1;
      --gray-bg: #f0f0ee;
      --gray-text: #6b6b66;
      --gray-border: #c8c8c4;
      --accent: #185fa5;
      --accent-bg: #e6f1fb;
      --accent-border: #b5d4f4;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --surface: #242422;
        --border: #333330;
        --border-strong: #4a4a46;
        --text-primary: #f0f0ec;
        --text-secondary: #a0a09a;
        --text-muted: #6a6a66;
        --green-bg: #173404;
        --green-text: #c0dd97;
        --green-border: #3b6d11;
        --yellow-bg: #412402;
        --yellow-text: #fac775;
        --yellow-border: #854f0b;
        --red-bg: #3b1010;
        --red-text: #f09595;
        --red-border: #a32d2d;
        --gray-bg: #2a2a28;
        --gray-text: #a0a09a;
        --gray-border: #4a4a46;
        --accent: #85b7eb;
        --accent-bg: #042c53;
        --accent-border: #185fa5;
      }
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font);
      min-height: 100vh;
    }

    .header {
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      padding: 14px 20px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .header p { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }

    .main {
      max-width: 520px;
      margin: 0 auto;
      padding: 18px 16px 60px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 9px;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .preset-btn {
      height: 50px;
      border-radius: var(--radius);
      border: 0.5px solid var(--border-strong);
      background: var(--surface);
      color: var(--text-primary);
      font-size: 15px;
      font-family: var(--font);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .preset-btn:active { opacity: 0.8; }

    .preset-btn.on {
      background: var(--red-bg);
      border-color: var(--red-border);
      color: var(--red-text);
      font-weight: 500;
    }

    .custom-row { display: flex; gap: 8px; margin-bottom: 10px; }

    .custom-row input {
      flex: 1;
      height: 46px;
      padding: 0 14px;
      border-radius: var(--radius);
      border: 0.5px solid var(--border-strong);
      background: var(--surface);
      color: var(--text-primary);
      font-size: 15px;
      font-family: var(--font);
    }

    .custom-row input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-bg);
    }

    .add-btn {
      height: 46px;
      padding: 0 16px;
      border-radius: var(--radius);
      border: 0.5px solid var(--border-strong);
      background: var(--surface);
      color: var(--text-primary);
      font-size: 14px;
      font-family: var(--font);
      cursor: pointer;
      white-space: nowrap;
    }

    .add-btn:active { opacity: 0.8; }

    .tag-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 10px;
      margin-bottom: 6px;
    }

    .tag {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--red-bg);
      border: 0.5px solid var(--red-border);
      color: var(--red-text);
      font-size: 13px;
      padding: 5px 10px;
      border-radius: 20px;
    }

    .tag button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--red-text);
      font-size: 17px;
      line-height: 1;
      padding: 0;
      display: flex;
      align-items: center;
    }

    .divider { height: 0.5px; background: var(--border); margin: 18px 0; }

    .field {
      height: 50px;
      width: 100%;
      padding: 0 14px;
      border-radius: var(--radius);
      border: 0.5px solid var(--border-strong);
      background: var(--surface);
      color: var(--text-primary);
      font-size: 15px;
      font-family: var(--font);
      margin-bottom: 12px;
    }

    .field:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-bg);
    }

    .location-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin: -8px 0 16px;
      line-height: 1.5;
    }

    .search-btn {
      width: 100%;
      height: 52px;
      border-radius: var(--radius);
      border: none;
      background: var(--text-primary);
      color: var(--bg);
      font-size: 16px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
    }

    .search-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .search-btn:active:not(:disabled) { opacity: 0.8; }

    .status {
      font-size: 13px;
      color: var(--text-secondary);
      margin: 14px 0 4px;
      min-height: 18px;
    }

    .results-heading {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin: 18px 0 10px;
    }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .card-header:active { background: var(--bg); }

    .score-pill {
      flex-shrink: 0;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .pill-clear { background: var(--green-bg); color: var(--green-text); border: 0.5px solid var(--green-border); }
    .pill-warn  { background: var(--yellow-bg); color: var(--yellow-text); border: 0.5px solid var(--yellow-border); }
    .pill-bad   { background: var(--red-bg); color: var(--red-text); border: 0.5px solid var(--red-border); }
    .pill-unk   { background: var(--gray-bg); color: var(--gray-text); border: 0.5px solid var(--gray-border); }

    .card-info { flex: 1; min-width: 0; }

    .card-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-brand { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    .card-hits { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }

    .hit-flag {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 10px;
      background: var(--red-bg);
      color: var(--red-text);
      border: 0.5px solid var(--red-border);
    }

    .chevron {
      color: var(--text-muted);
      font-size: 20px;
      flex-shrink: 0;
      transition: transform 0.2s;
      line-height: 1;
    }

    .chevron.open { transform: rotate(180deg); }

    .card-body {
      padding: 0 14px 14px;
      border-top: 0.5px solid var(--border);
    }

    .ing-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin: 11px 0 6px;
    }

    .ing-text {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.9;
    }

    .ing-hit {
      color: var(--red-text);
      font-weight: 600;
      background: var(--red-bg);
      border-radius: 3px;
      padding: 0 3px;
    }

    .updated-note {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .find-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 12px;
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      padding: 7px 14px;
      border: 0.5px solid var(--accent-border);
      border-radius: var(--radius);
      background: var(--accent-bg);
      -webkit-tap-highlight-color: transparent;
    }

    .local-section { margin-top: 6px; }

    .local-link-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text-primary);
      -webkit-tap-highlight-color: transparent;
    }

    .local-link-card:active { background: var(--bg); }

    .local-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .local-text { flex: 1; min-width: 0; }
    .local-title { font-size: 14px; font-weight: 500; }
    .local-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; line-height: 1.5; }

    .local-arrow { color: var(--text-muted); font-size: 18px; }

    .disclaimer {
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.7;
      padding: 12px 14px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .disclaimer strong { color: var(--text-secondary); }

    .error-box {
      font-size: 13px;
      color: var(--red-text);
      padding: 12px 14px;
      background: var(--red-bg);
      border: 0.5px solid var(--red-border);
      border-radius: var(--radius);
      margin-top: 10px;
      line-height: 1.6;
    }

    .empty {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header class="header">
  <h1>AisleClear</h1>
  <p>Real ingredient data from Open Food Facts</p>
</header>

<main class="main">

  <div class="section-label">Ingredients to avoid</div>
  <div class="preset-grid" id="presetGrid"></div>

  <div class="custom-row">
    <input id="customInput" type="text" placeholder="Add another ingredient..."
      autocomplete="off" autocorrect="off" autocapitalize="none" />
    <button class="add-btn" onclick="addCustom()">Add</button>
  </div>
  <div class="tag-strip" id="tagStrip"></div>

  <div class="divider"></div>

  <div class="section-label">What are you looking for?</div>
  <input class="field" id="productInput" type="text"
    placeholder="e.g. bread, crackers, pasta..." autocorrect="off" />

  <div class="section-label" style="margin-top:2px">
    Your city or zip code
    <span style="font-size:11px;color:var(--text-muted);text-transform:none;letter-spacing:0;font-weight:400">(optional)</span>
  </div>
  <input class="field" id="locationInput" type="text"
    placeholder="e.g. Dallas TX or 75201" autocorrect="off" />
  <p class="location-hint">Used to build local store search links. Not stored.</p>

  <button class="search-btn" id="searchBtn" onclick="doSearch()">
    <span id="btnContent">&#128269; Find safe products</span>
  </button>

  <div class="status" id="status"></div>
  <div id="resultsArea"></div>

</main>

<script>
const PRESETS = [
  { id:'gluten',    label:'Gluten',     terms:['wheat','barley','rye','malt','spelt','semolina','triticale','gluten','kamut','einkorn','emmer','farro','durum','wheat starch','wheat flour'] },
  { id:'dairy',     label:'Dairy',      terms:['milk','cream','butter','cheese','whey','casein','lactose','ghee','lactalbumin','lactoglobulin','caseinate','dairy','yogurt','kefir','buttermilk','curds','skim milk','whole milk','nonfat milk','dried milk'] },
  { id:'eggs',      label:'Eggs',       terms:['egg','albumin','mayonnaise','meringue','ovalbumin','ovomucin','ovomucoid','lysozyme','dried egg','egg white','egg yolk','whole egg'] },
  { id:'banana',    label:'Banana',     terms:['banana'] },
  { id:'soy',       label:'Soy',        terms:['soy','soya','tofu','edamame','miso','tempeh','tvp','textured vegetable protein','soybean','soy flour','soy protein'] },
  { id:'peanuts',   label:'Peanuts',    terms:['peanut','groundnut','arachis','peanut butter','peanut oil'] },
  { id:'tree nuts', label:'Tree nuts',  terms:['almond','cashew','walnut','pecan','pistachio','hazelnut','brazil nut','macadamia','pine nut','chestnut','coconut'] },
  { id:'sesame',    label:'Sesame',     terms:['sesame','tahini','til','gingelly','benne','sesame oil','sesame seed'] },
];

let active = new Set(['gluten','dairy','eggs','banana']);
let customTags = [];
let expanded = new Set();

function renderPresets() {
  const grid = document.getElementById('presetGrid');
  grid.innerHTML = '';
  PRESETS.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (active.has(p.id) ? ' on' : '');
    btn.innerHTML = active.has(p.id)
      ? `<span style="font-size:15px">&#10003;</span> ${p.label}`
      : `<span style="font-size:15px">+</span> ${p.label}`;
    btn.onclick = () => { active.has(p.id) ? active.delete(p.id) : active.add(p.id); renderPresets(); };
    grid.appendChild(btn);
  });
}

function renderTagStrip() {
  const strip = document.getElementById('tagStrip');
  strip.innerHTML = '';
  customTags.forEach((t, i) => {
    const chip = document.createElement('span');
    chip.className = 'tag';
    chip.innerHTML = `${t}<button onclick="removeCustom(${i})" aria-label="Remove ${t}">&times;</button>`;
    strip.appendChild(chip);
  });
}

function addCustom() {
  const inp = document.getElementById('customInput');
  const v = inp.value.trim().replace(/,$/, '').trim();
  if (!v) return;
  if (!customTags.map(t => t.toLowerCase()).includes(v.toLowerCase()) &&
      !PRESETS.find(p => p.id === v.toLowerCase())) {
    customTags.push(v);
    renderTagStrip();
  }
  inp.value = '';
  inp.focus();
}

function removeCustom(i) { customTags.splice(i, 1); renderTagStrip(); }

document.getElementById('customInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addCustom(); }
});

function getAllMatchers() {
  const matchers = PRESETS.filter(p => active.has(p.id)).map(p => ({ label: p.label, terms: p.terms }));
  customTags.forEach(t => matchers.push({ label: t, terms: [t.toLowerCase()] }));
  return matchers;
}

function detectHits(text, matchers) {
  const lower = text.toLowerCase();
  return matchers
    .filter(m => m.terms.some(t => new RegExp('\\b' + t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i').test(lower)))
    .map(m => m.label);
}

function highlightText(text, matchers) {
  let result = text;
  const terms = [];
  matchers.forEach(m => m.terms.forEach(t => terms.push(t)));
  terms.sort((a, b) => b.length - a.length);
  terms.forEach(t => {
    const re = new RegExp('(' + t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    result = result.replace(re, '<span class="ing-hit">$1</span>');
  });
  return result;
}

function toggleCard(i) {
  expanded.has(i) ? expanded.delete(i) : expanded.add(i);
  renderCards(window._lastProducts, window._lastMatchers);
}

function buildLocalLinks(product, allergens, location) {
  const allergenStr = allergens.join(' free ') + ' free';
  const query = allergenStr + ' ' + product;
  const localQuery = location ? query + ' near ' + location : query + ' near me';

  return [
    {
      icon: '&#128205;',
      bg: '#e6f1fb',
      title: 'Find local stores',
      desc: location ? `Search for "${query}" near ${location}` : 'Search for stores near you',
      url: 'https://www.google.com/maps/search/' + encodeURIComponent(localQuery),
    },
    {
      icon: '&#128722;',
      bg: '#eaf3de',
      title: 'Shop online',
      desc: `Search US retailers for "${query}"`,
      url: 'https://www.google.com/search?q=' + encodeURIComponent(query + ' buy online site:walmart.com OR site:amazon.com OR site:thrivemarket.com OR site:target.com'),
    },
    {
      icon: '&#128247;',
      bg: '#faeeda',
      title: 'Search all results',
      desc: `Open Google for "${query}"`,
      url: 'https://www.google.com/search?q=' + encodeURIComponent(query),
    },
  ];
}

function renderCards(products, matchers) {
  window._lastProducts = products;
  window._lastMatchers = matchers;

  const product = document.getElementById('productInput').value.trim();
  const location = document.getElementById('locationInput').value.trim();
  const allergenLabels = matchers.map(m => m.label);
  const area = document.getElementById('resultsArea');

  if (!products || !products.length) {
    area.innerHTML = '<div class="empty">No results found.<br>Try a broader search term like "bread" or "crackers".</div>';
    return;
  }

  const scored = products.map((p, i) => {
    const ing = p.ingredients_text || '';
    const hits = ing ? detectHits(ing, matchers) : [];
    return { ...p, hits, score: hits.length, hasIng: !!ing, _idx: i };
  }).sort((a, b) => {
    if (!a.hasIng && b.hasIng) return 1;
    if (a.hasIng && !b.hasIng) return -1;
    return a.score - b.score;
  });

  let html = `<div class="results-heading">&#128230; Packaged products (${scored.length})</div>`;

  scored.forEach((p, i) => {
    const isOpen = expanded.has(i);
    const name = p.product_name || 'Unknown product';
    const brand = p.brands || '';
    const url = p.url || ('https://world.openfoodfacts.org/product/' + p.code);
    const lastMod = p.last_modified_t
      ? new Date(p.last_modified_t * 1000).toLocaleDateString('en-US', { year: 'numeric', month: 'short' })
      : null;

    let pillClass, pillLabel;
    if (!p.hasIng)       { pillClass = 'pill-unk';   pillLabel = 'No data'; }
    else if (p.score === 0) { pillClass = 'pill-clear'; pillLabel = 'Clear'; }
    else if (p.score <= 2)  { pillClass = 'pill-warn';  pillLabel = p.score + ' hit' + (p.score > 1 ? 's' : ''); }
    else                 { pillClass = 'pill-bad';   pillLabel = p.score + ' hits'; }

    const highlighted = p.ingredients_text ? highlightText(p.ingredients_text, matchers) : '';

    html += `<div class="card">
      <div class="card-header" onclick="toggleCard(${i})">
        <span class="score-pill ${pillClass}">${pillLabel}</span>
        <div class="card-info">
          <div class="card-name" title="${name.replace(/"/g, '&quot;')}">${name}</div>
          ${brand ? `<div class="card-brand">${brand}</div>` : ''}
          ${p.hits.length ? `<div class="card-hits">${p.hits.map(h => `<span class="hit-flag">${h}</span>`).join('')}</div>` : ''}
        </div>
        <span class="chevron ${isOpen ? 'open' : ''}">&#8964;</span>
      </div>
      ${isOpen ? `<div class="card-body">
        <div class="ing-label">Ingredients</div>
        <div class="ing-text">${highlighted || '<em style="color:var(--text-muted)">No ingredient data in database for this product.</em>'}</div>
        ${lastMod ? `<div class="updated-note">Last updated in database: ${lastMod}</div>` : ''}
        <a class="find-link" href="${url}" target="_blank" rel="noopener">
          &#128269; View on Open Food Facts
        </a>
      </div>` : ''}
    </div>`;
  });

  const localLinks = buildLocalLinks(product, allergenLabels, location);
  html += `<div class="results-heading local-section">&#128205; Find it locally or online</div>`;
  localLinks.forEach(l => {
    html += `<a class="local-link-card" href="${l.url}" target="_blank" rel="noopener">
      <div class="local-icon" style="background:${l.bg}">${l.icon}</div>
      <div class="local-text">
        <div class="local-title">${l.title}</div>
        <div class="local-desc">${l.desc}</div>
      </div>
      <span class="local-arrow">&#8250;</span>
    </a>`;
  });

  html += `<div class="disclaimer">
    <strong>Always check the physical package.</strong> Ingredient data comes from Open Food Facts, a community-maintained database. The last-updated date is shown where available. Manufacturers change formulas without notice. Never rely solely on this app for allergy decisions.
  </div>`;

  area.innerHTML = html;
}

async function doSearch() {
  const product = document.getElementById('productInput').value.trim();
  const allergens = getAllMatchers();

  if (!product) { document.getElementById('status').textContent = 'Enter a food product to search for.'; return; }
  if (!allergens.length) { document.getElementById('status').textContent = 'Select at least one ingredient to avoid.'; return; }

  const btn = document.getElementById('searchBtn');
  const status = document.getElementById('status');
  btn.disabled = true;
  document.getElementById('btnContent').innerHTML = '<span class="spinner"></span> Searching...';
  status.textContent = 'Fetching from Open Food Facts...';
  document.getElementById('resultsArea').innerHTML = '';
  expanded.clear();

  try {
    const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(product)}&search_simple=1&action=process&json=1&page_size=40&fields=product_name,brands,ingredients_text,url,code,last_modified_t&lc=en&cc=us`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`Open Food Facts returned ${resp.status}`);
    const data = await resp.json();
    const products = (data.products || []).filter(p => p.product_name && p.product_name.trim());

    if (!products.length) {
      status.textContent = `No products found for "${product}".`;
      document.getElementById('resultsArea').innerHTML = '<div class="empty">No results found.<br>Try a broader search term like "bread" or "crackers".</div>';
    } else {
      const clearCount = products.filter(p => {
        const ing = p.ingredients_text || '';
        return ing && detectHits(ing, allergens).length === 0;
      }).length;
      status.textContent = `${products.length} products found. ${clearCount} appear clear of your allergens.`;
      renderCards(products, allergens);
    }

  } catch (e) {
    status.textContent = '';
    document.getElementById('resultsArea').innerHTML = `<div class="error-box">Could not reach Open Food Facts: ${e.message}. Check your connection and try again.</div>`;
  }

  btn.disabled = false;
  document.getElementById('btnContent').innerHTML = '&#128269; Find safe products';
}

document.getElementById('productInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

renderPresets();
renderTagStrip();
</script>

</body>
</html>
